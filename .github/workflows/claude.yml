name: Claude

# The @claude fixer. When the reviewer (or a human) comments "@claude ..." on a PR or
# issue, Claude checks out the branch, makes the requested change, and pushes. The push
# re-triggers CI + the reviewer (pr-review.yml), closing the loop with no human between.
#
# Stack-agnostic: no build/test commands are pinned here. Claude reads the repo's
# CLAUDE.md / AGENTS.md and package manifest to figure out how to build and test.
#
# Auth: CLAUDE_CODE_OAUTH_TOKEN (Claude subscription token). Requires the Claude GitHub
# App installed on the repo (it supplies the bot git identity for the push).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: >
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && github.event.review.body != null && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Guard: token present
        id: guard
        run: |
          if [ -z "${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Fix
        if: steps.guard.outputs.ok == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The reviewer posts its "@claude fix ..." as the Claude App bot; accept that
          # named bot (never "*") so the loop runs but external bots cannot trigger it.
          allowed_bots: "claude[bot],claude"
          # No prompt -> interactive mode: implement the requested change on the branch,
          # add/adjust tests to match the repo's conventions, and push. Read CLAUDE.md /
          # AGENTS.md for the repo's build + test commands before pushing.
          claude_args: |
            --max-turns 40
